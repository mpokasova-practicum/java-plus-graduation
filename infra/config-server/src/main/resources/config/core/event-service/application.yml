server:
  port: 0

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:25433/events
    username: events
    password: events

stats-server:
  url: http://localhost:9090

logging:
  level:
    root: INFO
    ru.yandex.practicum.explorewithme.main: DEBUG